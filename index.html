<!DOCTYPE html>
<html>
<head>
<style>
	
body { font-family: sans-serif; background-color: lightblue; }
.title {margin-bottom:140px; }
.item-div {  margin-bottom:8px;}
.item-button {vertical-align: middle;}
.item-counter-el {display:inline-block;vertical-align: middle;font-size:1.4rem; margin-left: 30px; font-weight:;}
.reset-item-div {  margin-top:15px;}
</style>
</head>

<body>

<div class='title'> events</div>


<div class='item-div' >

<button id="s1-1" class='item-button'> Item</button>

<div id='s1-1c' class='item-counter-el' >0</div>

</div>


<div class='reset-item-div' >

<button id="s1-reset" > 
	s1 reset
</button>

</div>


<script>
/////////////////////////////
/////////////////////////////
/////////////////////////////

const s1 = {
	
  count: 0,
  
  alert(){
    alert(this.count);  
  },
  
  add() {
  this.count++
  this.counter.innerHTML = this.count; 
  },
  
  reset(){
    this.count = 0;
    this.update_counter();
  },
  
  update_counter(){this.counter.innerHTML = this.count; },
  
  button: document.getElementById("s1-1"),
  counter: document.getElementById("s1-1c"),
  resetButton: document.getElementById("s1-reset"),
  

  initialize_item_button() {
  	this.button.addEventListener("click", () => this.add());
  },
  
  initialize_reset_button() {
  	this.resetButton.addEventListener("click", () => this.reset());
  },
  
};

// Call it once at start.
s1.initialize_item_button();
s1.initialize_reset_button();






















  
</script>
