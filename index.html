<!DOCTYPE html>
<html>
<head>
<style>
	
body { font-size: 2rem; font-family: sans-serif; background-color: lightblue; }
.title {margin-bottom:140px; }
.counter-div { display:flex; gap:45px;}
 
</style>
</head>

<body>

<div class='title'> events</div>

<div class='counter-div' >

<button id="s1-1" > Item</button>

<div id='s1-1c' class='counter-el' >0</div>

</div>

<button id="s1-reset" > s1 reset</button>


<script>
/////////////////////////////
/////////////////////////////
/////////////////////////////

const s1 = {
	
  count: 0,
  
  alert(){
    alert(this.count);  
  },
  
  add() {
  this.count++
  this.counter.innerHTML = this.count; 
  },
  
  button: document.getElementById("s1-1"),
  counter: document.getElementById("s1-1c"),
  reset: document.getElementById("s1-reset"),
  

  initialize_item_button() {
  	this.button.addEventListener("click", () => this.alert());
  },
  
  initialize_reset_button() {
  	this.reset.addEventListener("click", () => this.alert());
  },
  
};

// Call it once at start.
s1.initialize_item_button();
s1.initialize_reset_button();

</script>

</body>
